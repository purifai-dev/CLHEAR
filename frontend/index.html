<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLHEAR.ai — Compliance Intelligence</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f1117;
      --surface: #1a1d27;
      --surface2: #232635;
      --border: #2e3148;
      --accent: #4f7dff;
      --accent-dim: #2a3d7a;
      --text: #e2e4ef;
      --text-dim: #8b8fa8;
      --green: #3ecf8e;
      --yellow: #f0c040;
      --red: #e05c5c;
      --orange: #e89b50;
      --purple: #a78bfa;
      --radius: 8px;
      --font: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      --mono: "JetBrains Mono", "Fira Code", "Cascadia Code", monospace;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font);
      font-size: 14px;
      min-height: 100vh;
    }

    .app { display: flex; flex-direction: column; min-height: 100vh; }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      display: flex;
      align-items: center;
      gap: 32px;
      height: 52px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo {
      font-size: 16px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--accent);
      white-space: nowrap;
    }

    nav { display: flex; gap: 4px; overflow-x: auto; }

    nav button {
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      padding: 6px 14px;
      border-radius: var(--radius);
      font-size: 13px;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      position: relative;
    }

    nav button:hover { background: var(--surface2); color: var(--text); }
    nav button.active { background: var(--accent-dim); color: var(--accent); font-weight: 600; }

    .nav-badge {
      position: absolute;
      top: 2px;
      right: 2px;
      background: var(--red);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      min-width: 16px;
      height: 16px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0 4px;
    }

    main { flex: 1; padding: 24px; max-width: 1400px; width: 100%; margin: 0 auto; }

    /* Stats cards */
    .stat-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 16px; margin-bottom: 24px; }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
    }

    .stat-card .val { font-size: 32px; font-weight: 700; line-height: 1; }
    .stat-card .lbl { font-size: 12px; color: var(--text-dim); margin-top: 6px; text-transform: uppercase; letter-spacing: 0.06em; }

    /* Breakdown tables */
    .breakdown-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 16px; margin-bottom: 28px; }

    .breakdown-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
    }

    .breakdown-card h3 { font-size: 12px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); margin-bottom: 12px; }
    .breakdown-card table { width: 100%; border-collapse: collapse; }
    .breakdown-card td { padding: 5px 0; font-size: 13px; }
    .breakdown-card td:last-child { text-align: right; font-weight: 600; color: var(--accent); }

    /* Toolbar */
    .toolbar {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      align-items: center;
      margin-bottom: 16px;
    }

    .toolbar input[type=text], .toolbar input[type=email] {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 7px 12px;
      font-size: 13px;
      min-width: 220px;
      outline: none;
      transition: border-color 0.15s;
    }

    .toolbar input:focus { border-color: var(--accent); }
    .toolbar input::placeholder { color: var(--text-dim); }

    .toolbar select {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: var(--radius);
      padding: 7px 12px;
      font-size: 13px;
      cursor: pointer;
      outline: none;
    }

    .toolbar select:focus { border-color: var(--accent); }
    .count-label { color: var(--text-dim); font-size: 13px; margin-left: auto; }

    /* Buttons */
    .btn {
      padding: 7px 16px;
      border-radius: var(--radius);
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
      font-size: 13px;
      cursor: pointer;
      transition: all 0.15s;
      display: inline-flex;
      align-items: center;
      gap: 6px;
    }

    .btn:hover { border-color: var(--accent); color: var(--accent); }
    .btn:disabled { opacity: 0.4; cursor: default; }

    .btn-primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn-primary:hover { background: #3d6ae8; }

    .btn-danger {
      color: var(--red);
      border-color: var(--red);
    }

    .btn-danger:hover { background: rgba(224,92,92,0.15); }

    .btn-success {
      color: var(--green);
      border-color: var(--green);
    }

    .btn-success:hover { background: rgba(62,207,142,0.15); }

    .btn-sm { padding: 4px 10px; font-size: 12px; }

    /* Table */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; }

    thead th {
      background: var(--surface2);
      color: var(--text-dim);
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      font-weight: 600;
      padding: 10px 14px;
      text-align: left;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
    }

    tbody tr {
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
    }

    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: var(--surface2); }

    tbody td {
      padding: 11px 14px;
      font-size: 13px;
      vertical-align: middle;
    }

    td.code { font-family: var(--mono); font-size: 12px; color: var(--accent); }
    td.dimmed { color: var(--text-dim); }

    /* Badges */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .badge-critical { background: rgba(224,92,92,0.2); color: var(--red); }
    .badge-high { background: rgba(232,155,80,0.15); color: var(--orange); }
    .badge-medium { background: rgba(240,192,64,0.15); color: var(--yellow); }
    .badge-low { background: rgba(62,207,142,0.15); color: var(--green); }
    .badge-default { background: var(--surface2); color: var(--text-dim); }
    .badge-info { background: rgba(79,125,255,0.15); color: var(--accent); }
    .badge-warning { background: rgba(240,192,64,0.15); color: var(--yellow); }
    .badge-error { background: rgba(224,92,92,0.2); color: var(--red); }
    .badge-success { background: rgba(62,207,142,0.15); color: var(--green); }
    .badge-running { background: rgba(167,139,250,0.15); color: var(--purple); }

    /* Pagination */
    .pagination {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 16px;
      background: var(--surface2);
      border-top: 1px solid var(--border);
    }

    .pagination button {
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 5px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    .pagination button:disabled { opacity: 0.35; cursor: default; }
    .pagination button:not(:disabled):hover { border-color: var(--accent); color: var(--accent); }
    .pagination .page-info { color: var(--text-dim); font-size: 12px; }

    /* Modal overlay */
    .modal-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.65);
      z-index: 1000;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 20px;
      overflow-y: auto;
    }

    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      width: 100%;
      max-width: 820px;
      padding: 28px;
      position: relative;
    }

    .modal-close {
      position: absolute;
      top: 16px;
      right: 16px;
      background: var(--surface2);
      border: none;
      color: var(--text-dim);
      width: 28px;
      height: 28px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
    }

    .modal-close:hover { color: var(--text); background: var(--border); }

    .modal h2 { font-size: 18px; margin-bottom: 4px; padding-right: 40px; }
    .modal .sub { color: var(--text-dim); font-size: 13px; margin-bottom: 20px; }

    .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; margin-bottom: 20px; }

    .field { display: flex; flex-direction: column; gap: 4px; }
    .field label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--text-dim); }
    .field span { font-size: 13px; }

    .field input, .field select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 8px 12px;
      font-size: 13px;
      outline: none;
    }
    .field input:focus, .field select:focus { border-color: var(--accent); }

    .section-title {
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--text-dim);
      margin: 20px 0 10px;
      padding-bottom: 6px;
      border-bottom: 1px solid var(--border);
    }

    pre.rule-text {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text);
      max-height: 400px;
      overflow-y: auto;
    }

    pre.json-block {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      font-family: var(--mono);
      font-size: 12px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--green);
    }

    .reasoning-box {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      font-size: 13px;
      line-height: 1.6;
      color: var(--text);
    }

    .source-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--accent);
      text-decoration: none;
      font-size: 13px;
      padding: 6px 12px;
      border: 1px solid var(--accent-dim);
      border-radius: 6px;
      transition: background 0.15s;
    }

    .source-link:hover { background: var(--accent-dim); }

    .related-obligations { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 8px; }
    .related-chip {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .related-chip:hover { border-color: var(--accent); }
    .related-chip .chip-code { font-family: var(--mono); color: var(--accent); font-size: 11px; }

    .json-preview {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
      max-width: 280px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .expanded-row td { padding: 0 !important; }
    .expanded-json {
      background: var(--bg);
      padding: 12px 16px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--green);
      white-space: pre-wrap;
      word-break: break-word;
      border-top: 1px solid var(--border);
    }

    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-dim);
    }

    .empty-state .icon { font-size: 32px; margin-bottom: 12px; }

    .loading { text-align: center; padding: 40px; color: var(--text-dim); }
    .error-banner {
      background: rgba(224,92,92,0.1);
      border: 1px solid var(--red);
      border-radius: var(--radius);
      padding: 12px 16px;
      color: var(--red);
      margin-bottom: 16px;
      font-size: 13px;
    }

    .success-banner {
      background: rgba(62,207,142,0.1);
      border: 1px solid var(--green);
      border-radius: var(--radius);
      padding: 12px 16px;
      color: var(--green);
      margin-bottom: 16px;
      font-size: 13px;
    }

    .section-header { font-size: 18px; font-weight: 600; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; }

    .text-preview {
      color: var(--text-dim);
      font-size: 12px;
      max-width: 300px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* News card */
    .news-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px 20px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .news-card:hover { border-color: var(--accent); }
    .news-card.unread { border-left: 3px solid var(--accent); }
    .news-card .news-title { font-size: 15px; font-weight: 600; margin-bottom: 6px; }
    .news-card .news-meta { display: flex; gap: 12px; align-items: center; font-size: 12px; color: var(--text-dim); margin-bottom: 8px; }
    .news-card .news-summary { font-size: 13px; color: var(--text-dim); line-height: 1.5; }

    /* Form modal */
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; font-size: 12px; text-transform: uppercase; letter-spacing: 0.04em; color: var(--text-dim); margin-bottom: 6px; }
    .form-group input, .form-group select {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 9px 12px;
      font-size: 13px;
      outline: none;
    }
    .form-group input:focus, .form-group select:focus { border-color: var(--accent); }
    .form-actions { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }

    /* Checkbox group */
    .checkbox-group { display: flex; flex-wrap: wrap; gap: 10px; }
    .checkbox-group label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      color: var(--text);
      text-transform: none;
      letter-spacing: normal;
      cursor: pointer;
    }
    .checkbox-group input[type=checkbox] {
      width: 16px;
      height: 16px;
      accent-color: var(--accent);
    }

    /* Status dot */
    .status-dot {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 6px;
    }
    .status-dot.active { background: var(--green); }
    .status-dot.inactive { background: var(--text-dim); }
    .status-dot.error { background: var(--red); }
    .status-dot.running { background: var(--purple); animation: pulse 1.5s infinite; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
  </style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/htm@3/dist/htm.js"></script>
<script>
const { useState, useEffect, useCallback, useRef } = React;
const html = htm.bind(React.createElement);

// Utilities

async function fetchJSON(path) {
  const res = await fetch(path);
  if (!res.ok) throw new Error('API ' + res.status + ': ' + (await res.text()));
  return res.json();
}

async function postJSON(path, body) {
  const res = await fetch(path, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error('API ' + res.status + ': ' + (await res.text()));
  return res.json();
}

async function putJSON(path, body) {
  const res = await fetch(path, {
    method: 'PUT',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(body),
  });
  if (!res.ok) throw new Error('API ' + res.status + ': ' + (await res.text()));
  return res.json();
}

async function deleteJSON(path) {
  const res = await fetch(path, { method: 'DELETE' });
  if (!res.ok) throw new Error('API ' + res.status + ': ' + (await res.text()));
  return res.json();
}

function buildQuery(params) {
  const q = new URLSearchParams();
  for (const [k, v] of Object.entries(params)) {
    if (v !== '' && v !== null && v !== undefined) q.append(k, v);
  }
  const s = q.toString();
  return s ? '?' + s : '';
}

function severityBadge(s) {
  if (!s) return html`<span class="badge badge-default">--</span>`;
  const cls = s === 'critical' ? 'badge-critical' : s === 'high' ? 'badge-high' : s === 'medium' ? 'badge-medium' : s === 'low' ? 'badge-low' : 'badge-default';
  return html`<span class="badge ${cls}">${s}</span>`;
}

function statusBadge(s) {
  if (!s) return html`<span class="badge badge-default">--</span>`;
  const cls = s === 'success' ? 'badge-success' : s === 'error' ? 'badge-error' : s === 'running' ? 'badge-running' : 'badge-default';
  return html`<span class="badge ${cls}">${s}</span>`;
}

function auditSeverityBadge(s) {
  if (!s) return html`<span class="badge badge-default">--</span>`;
  const cls = s === 'critical' ? 'badge-critical' : s === 'error' ? 'badge-error' : s === 'warning' ? 'badge-warning' : 'badge-info';
  return html`<span class="badge ${cls}">${s}</span>`;
}

function fmtDate(iso) {
  if (!iso) return '--';
  return new Date(iso).toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function jsonPreview(obj) {
  if (obj == null) return '--';
  return JSON.stringify(obj).slice(0, 120);
}

function relativeTime(iso) {
  if (!iso) return '--';
  const d = new Date(iso);
  const now = new Date();
  const diff = now - d;
  if (diff < 60000) return 'just now';
  if (diff < 3600000) return Math.floor(diff / 60000) + 'm ago';
  if (diff < 86400000) return Math.floor(diff / 3600000) + 'h ago';
  return Math.floor(diff / 86400000) + 'd ago';
}

// StatCard

function StatCard({ val, lbl, color }) {
  return html`
    <div class="stat-card">
      <div class="val" style=${{ color: color || 'var(--text)' }}>${val ?? '--'}</div>
      <div class="lbl">${lbl}</div>
    </div>
  `;
}

// BreakdownTable

function BreakdownTable({ title, data }) {
  const entries = Object.entries(data || {});
  return html`
    <div class="breakdown-card">
      <h3>${title}</h3>
      ${entries.length === 0
        ? html`<p style=${{ color: 'var(--text-dim)', fontSize: '12px' }}>No data</p>`
        : html`
          <table>
            <tbody>
              ${entries.map(([k, v]) => html`
                <tr key=${k}>
                  <td>${k}</td>
                  <td>${v}</td>
                </tr>
              `)}
            </tbody>
          </table>
        `
      }
    </div>
  `;
}

// ============================================================
// DashboardView
// ============================================================

function DashboardView({ stats, loading, error }) {
  if (loading) return html`<div class="loading">Loading stats...</div>`;
  if (error) return html`<div class="error-banner">${error}</div>`;
  if (!stats) return null;

  const numCategories = Object.keys(stats.by_category || {}).length;
  const numRegulators = Object.keys(stats.by_regulator || {}).length;
  const newsStats = stats.news || {};

  return html`
    <div>
      <div class="section-header">Dashboard</div>
      <div class="stat-grid">
        <${StatCard} val=${stats.total_obligations} lbl="Total Obligations" color="var(--accent)" />
        <${StatCard} val=${numRegulators} lbl="Regulators" color="var(--green)" />
        <${StatCard} val=${numCategories} lbl="Categories" />
        <${StatCard} val=${stats.total_sources} lbl="Source Rules" color="var(--yellow)" />
        <${StatCard} val=${stats.total_audit_events} lbl="Audit Events" color="var(--text-dim)" />
        <${StatCard} val=${newsStats.total || 0} lbl="News Items" color="var(--orange)" />
        <${StatCard} val=${newsStats.unread || 0} lbl="Unread News" color="var(--red)" />
        <${StatCard} val=${stats.active_jobs || 0} lbl="Active Jobs" color="var(--purple)" />
      </div>
      <div class="breakdown-grid">
        <${BreakdownTable} title="By Regulator" data=${stats.by_regulator} />
        <${BreakdownTable} title="By Category" data=${stats.by_category} />
        <${BreakdownTable} title="By Severity" data=${stats.by_severity} />
        <${BreakdownTable} title="Sources by Regulator" data=${stats.sources_by_regulator} />
      </div>
    </div>
  `;
}

// ============================================================
// ObligationModal
// ============================================================

function ObligationModal({ item, onClose }) {
  useEffect(() => {
    const onKey = (e) => { if (e.key === 'Escape') onClose(); };
    window.addEventListener('keydown', onKey);
    return () => window.removeEventListener('keydown', onKey);
  }, [onClose]);

  return html`

// SchedulerView
// ============================================================

function SchedulerView() {
  const [jobs, setJobs] = useState([]);
  const [loading, setLoading] = useState(true);
  const [error, setError] = useState(null);
  const [showForm, setShowForm] = useState(false);
  const [formData, setFormData] = useState({ name: '', regulator: 'FINRA', schedule_cron: '0 6 * * *' });
  const [success, setSuccess] = useState(null);

  const loadJobs = async () => {
    setLoading(true);
    try {
      const res = await fetchJSON('/api/scheduler/jobs');
      setJobs(res.items || []);
    } catch (e) { setError(e.message); }
    finally { setLoading(false); }
  };

  useEffect(() => { loadJobs(); }, []);

  const createJob = async () => {
    try {
      await postJSON('/api/scheduler/jobs', formData);
      setShowForm(false);
      setFormData({ name: '', regulator: 'FINRA', schedule_cron: '0 6 * * *' });
      setSuccess('Scheduler job created successfully');
      setTimeout(() => setSuccess(null), 3000);
      loadJobs();
    } catch (e) { setError(e.message); }
  };

  const toggleJob = async (job) => {
    try {
      await putJSON('/api/scheduler/jobs/' + job.id, { enabled: !job.enabled });
      loadJobs();
    } catch (e) { setError(e.message); }
  };

  const runNow = async (job) => {
    try {
      await postJSON('/api/scheduler/jobs/' + job.id + '/run', {});
      setSuccess('Job triggered: ' + job.name);
      setTimeout(() => { setSuccess(null); loadJobs(); }, 2000);
    } catch (e) { setError(e.message); }
  };

  const removeJob = async (job) => {
    try {
      await deleteJSON('/api/scheduler/jobs/' + job.id);
      setSuccess('Job deleted');
      setTimeout(() => setSuccess(null), 3000);
      loadJobs();
    } catch (e) { setError(e.message); }
  };

  const cronLabels = {
    '0 6 * * *': 'Daily at 6:00 AM',
    '0 */6 * * *': 'Every 6 hours',
    '0 */12 * * *': 'Every 12 hours',
    '0 8 * * 1': 'Weekly (Mon 8 AM)',
    '0 0 1 * *': 'Monthly (1st, midnight)',
  };

  return html`
    <div>
      <div class="section-header">
        Scheduler
        <button class="btn btn-primary" onClick=${() => setShowForm(true)}>+ New Job</button>
      </div>

      ${error && html`<div class="error-banner">${error}</div>`}
      ${success && html`<div class="success-banner">${success}</div>`}

      ${loading ? html`<div class="loading">Loading jobs...</div>` : html`
        ${jobs.length === 0 ? html`
          <div class="empty-state" style=${{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', padding: '60px' }}>
            <div class="icon" style=${{ fontSize: '48px' }}>--</div>
            <div style=${{ fontSize: '16px', marginBottom: '8px' }}>No scheduled jobs</div>
            <div style=${{ fontSize: '13px', marginBottom: '20px' }}>Create a scheduler job to automatically scan regulator websites for updates.</div>
            <button class="btn btn-primary" onClick=${() => setShowForm(true)}>+ Create First Job</button>
          </div>
        ` : html`
          <div class="table-wrap">
            <table>
              <thead>
                <tr><th>Status</th><th>Name</th><th>Regulator</th><th>Schedule</th><th>Last Run</th><th>Last Status</th><th>Next Run</th><th>Actions</th></tr>
              </thead>
              <tbody>
                ${jobs.map(job => html`
                  <tr key=${job.id} style=${{ cursor: 'default' }}>
                    <td>
                      <span class=${'status-dot ' + (job.last_status === 'running' ? 'running' : job.enabled ? 'active' : 'inactive')}></span>
                      ${job.enabled ? 'Active' : 'Paused'}
                    </td>
                    <td style=${{ fontWeight: 600 }}>${job.name}</td>
                    <td>${job.regulator}</td>
                    <td class="dimmed" style=${{ fontFamily: 'var(--mono)', fontSize: '12px' }}>${cronLabels[job.schedule_cron] || job.schedule_cron}</td>
                    <td class="dimmed" style=${{ fontSize: '12px' }}>${job.last_run ? relativeTime(job.last_run) : 'Never'}</td>
                    <td>${statusBadge(job.last_status)}</td>
                    <td class="dimmed" style=${{ fontSize: '12px' }}>${job.next_run ? fmtDate(job.next_run) : '--'}</td>
                    <td onClick=${(e) => e.stopPropagation()}>
                      <div style=${{ display: 'flex', gap: '6px' }}>
                        <button class="btn btn-sm btn-success" onClick=${() => runNow(job)} title="Run now">Run</button>
                        <button class="btn btn-sm" onClick=${() => toggleJob(job)}>${job.enabled ? 'Pause' : 'Resume'}</button>
                        <button class="btn btn-sm btn-danger" onClick=${() => removeJob(job)}>Del</button>
                      </div>
                    </td>
                  </tr>
                `)}
              </tbody>
            </table>
          </div>
        `}
      `}

      ${showForm && html`
        <div class="modal-overlay" onClick=${(e) => e.target === e.currentTarget && setShowForm(false)}>
          <div class="modal" style=${{ maxWidth: '500px' }}>
            <button class="modal-close" onClick=${() => setShowForm(false)}>X</button>
            <h2>Create Scheduler Job</h2>
            <div class="sub">Set up automated regulatory scanning</div>

            <div class="form-group">
              <label>Job Name</label>
              <input value=${formData.name} onInput=${(e) => setFormData(d => ({...d, name: e.target.value}))} placeholder="e.g., FINRA Daily Scan" />
            </div>

            <div class="form-group">
              <label>Regulator</label>
              <select value=${formData.regulator} onChange=${(e) => setFormData(d => ({...d, regulator: e.target.value}))}>
                <option value="FINRA">FINRA</option>
                <option value="FCA">FCA</option>
              </select>
            </div>

            <div class="form-group">
              <label>Schedule</label>
              <select value=${formData.schedule_cron} onChange=${(e) => setFormData(d => ({...d, schedule_cron: e.target.value}))}>
                <option value="0 6 * * *">Daily at 6:00 AM</option>
                <option value="0 */6 * * *">Every 6 hours</option>
                <option value="0 */12 * * *">Every 12 hours</option>
                <option value="0 8 * * 1">Weekly (Monday 8 AM)</option>
                <option value="0 0 1 * *">Monthly (1st, midnight)</option>
              </select>
            </div>

            <div class="form-actions">
              <button class="btn" onClick=${() => setShowForm(false)}>Cancel</button>
              <button class="btn btn-primary" onClick=${createJob} disabled=${!formData.name}>Create Job</button>
            </div>
          </div>
        </div>
      `}
    </div>
  `;
}

// ============================================================
// NewsView
// ============================================================

function NewsView() {
  const [data, setData] = useState({ items: [], total: 0, page: 1, pages: 1 });
  const [filters, setFilters] = useState({ regulator: '', importance: '', q: '', page: 1 });
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [success, setSuccess] = useState(null);
  const [scraping, setScraping] = useState(false);
  const [showEmailForm, setShowEmailForm] = useState(false);
  const [emailSubs, setEmailSubs] = useState([]);
  const [emailForm, setEmailForm] = useState({ email: '', name: '', regulators: ['FINRA', 'FCA'], frequency: 'daily' });
  const debounceRef = useRef(null);

  const fetchData = useCallback(async (f) => {
    setLoading(true); setError(null);
    try { setData(await fetchJSON('/api/news' + buildQuery(f))); }
    catch (e) { setError(e.message); }
    finally { setLoading(false); }
  }, []);

  useEffect(() => {
    if (debounceRef.current) clearTimeout(debounceRef.current);
    debounceRef.current = setTimeout(() => fetchData(filters), 300);
    return () => clearTimeout(debounceRef.current);
  }, [filters, fetchData]);

  const loadEmailSubs = async () => {
    try { const res = await fetchJSON('/api/email/subscriptions'); setEmailSubs(res.items || []); }
    catch (e) { console.error(e); }
  };

  useEffect(() => { loadEmailSubs(); }, []);

  const setFilter = (key, val) => setFilters(f => ({ ...f, [key]: val, page: 1 }));
  const setPage = (p) => setFilters(f => ({ ...f, page: p }));

  const scrapeNow = async () => {
    setScraping(true);
    try {
      const result = await postJSON('/api/news/scrape-all', {});
      const total = Object.values(result).reduce((s, r) => s + (r.new_items || 0), 0);
      setSuccess('Scraped ' + total + ' new items from all regulators');
      setTimeout(() => setSuccess(null), 5000);
      fetchData(filters);
    } catch (e) { setError(e.message); }
    finally { setScraping(false); }
  };

  const markRead = async (id) => {
    try {
      await postJSON('/api/news/' + id + '/read', { read: true });
      fetchData(filters);
    } catch (e) { setError(e.message); }
  };

  const createEmailSub = async () => {
    try {
      await postJSON('/api/email/subscriptions', emailForm);
      setShowEmailForm(false);
      setEmailForm({ email: '', name: '', regulators: ['FINRA', 'FCA'], frequency: 'daily' });
      setSuccess('Email subscription created');
      setTimeout(() => setSuccess(null), 3000);
      loadEmailSubs();
    } catch (e) { setError(e.message); }
  };

  const deleteEmailSub = async (id) => {
    try {
      await deleteJSON('/api/email/subscriptions/' + id);
      loadEmailSubs();
    } catch (e) { setError(e.message); }
  };

  const sendDigests = async () => {
    try {
      const result = await postJSON('/api/email/send-digests', {});
      setSuccess('Sent ' + result.sent + ' digest emails');
      setTimeout(() => setSuccess(null), 5000);
      loadEmailSubs();
    } catch (e) { setError(e.message); }
  };

  const toggleRegulator = (reg) => {
    setEmailForm(f => {
      const regs = f.regulators.includes(reg) ? f.regulators.filter(r => r !== reg) : [...f.regulators, reg];
      return { ...f, regulators: regs };
    });
  };

  return html`
    <div>
      <div class="section-header">
        Regulatory News
        <button class="btn btn-primary" onClick=${scrapeNow} disabled=${scraping}>
          ${scraping ? 'Scraping...' : 'Fetch Latest News'}
        </button>
        <button class="btn" onClick=${() => setShowEmailForm(true)}>Email Alerts</button>
      </div>

      ${error && html`<div class="error-banner">${error}</div>`}
      ${success && html`<div class="success-banner">${success}</div>`}

      <div class="toolbar">
        <input type="text" placeholder="Search news..." value=${filters.q} onInput=${(e) => setFilter('q', e.target.value)} />
        <select value=${filters.regulator} onChange=${(e) => setFilter('regulator', e.target.value)}>
          <option value="">All Regulators</option>
          <option value="FINRA">FINRA</option>
          <option value="FCA">FCA</option>
        </select>
        <select value=${filters.importance} onChange=${(e) => setFilter('importance', e.target.value)}>
          <option value="">All Importance</option>
          <option value="critical">Critical</option>
          <option value="high">High</option>
          <option value="medium">Medium</option>
          <option value="low">Low</option>
        </select>
        <span class="count-label">${data.total} item${data.total !== 1 ? 's' : ''}</span>
      </div>

      ${loading ? html`<div class="loading">Loading news...</div>`
        : data.items.length === 0 ? html`
          <div class="empty-state" style=${{ background: 'var(--surface)', border: '1px solid var(--border)', borderRadius: 'var(--radius)', padding: '60px' }}>
            <div class="icon" style=${{ fontSize: '48px' }}>--</div>
            <div style=${{ fontSize: '16px', marginBottom: '8px' }}>No regulatory news yet</div>
            <div style=${{ fontSize: '13px', marginBottom: '20px' }}>Click "Fetch Latest News" to scrape the latest regulatory updates from FINRA and FCA.</div>
            <button class="btn btn-primary" onClick=${scrapeNow} disabled=${scraping}>Fetch Latest News</button>
          </div>
        `
        : html`
          ${data.items.map(item => html`
            <div class=${'news-card' + (item.is_read ? '' : ' unread')} key=${item.id} onClick=${() => !item.is_read && markRead(item.id)}>
              <div class="news-meta">
                ${severityBadge(item.importance)}
                <span>${item.regulator}</span>
                <span>${item.category}</span>
                <span>${fmtDate(item.published_date)}</span>
                ${!item.is_read && html`<span style=${{ color: 'var(--accent)', fontWeight: 600 }}>NEW</span>`}
              </div>
              <div class="news-title">${item.title}</div>
              <div class="news-summary">${item.summary}</div>
              ${item.source_url && html`
                <a href=${item.source_url} target="_blank" rel="noopener" style=${{ color: 'var(--accent)', fontSize: '12px', marginTop: '8px', display: 'inline-block' }}
                   onClick=${(e) => e.stopPropagation()}>
                  View Source ->
                </a>
              `}
            </div>
          `)}

          ${data.pages > 1 && html`
            <div style=${{ display: 'flex', justifyContent: 'center', gap: '10px', marginTop: '20px' }}>
              <button class="btn" disabled=${filters.page <= 1} onClick=${() => setPage(filters.page - 1)}>Prev</button>
              <span style=${{ color: 'var(--text-dim)', fontSize: '13px', lineHeight: '32px' }}>Page ${filters.page} of ${data.pages}</span>
              <button class="btn" disabled=${filters.page >= data.pages} onClick=${() => setPage(filters.page + 1)}>Next</button>
            </div>
          `}
        `}

      ${showEmailForm && html`
        <div class="modal-overlay" onClick=${(e) => e.target === e.currentTarget && setShowEmailForm(false)}>
          <div class="modal" style=${{ maxWidth: '600px' }}>
            <button class="modal-close" onClick=${() => setShowEmailForm(false)}>X</button>
            <h2>Email Alert Subscriptions</h2>
            <div class="sub">Configure daily email digests for your compliance team</div>

            ${emailSubs.length > 0 && html`
              <div class="section-title">Active Subscriptions (${emailSubs.length})</div>
              <div class="table-wrap" style=${{ marginBottom: '20px' }}>
                <table>
                  <thead><tr><th>Email</th><th>Regulators</th><th>Frequency</th><th>Last Sent</th><th></th></tr></thead>
                  <tbody>
                    ${emailSubs.map(sub => html`
                      <tr key=${sub.id} style=${{ cursor: 'default' }}>
                        <td style=${{ fontWeight: 500 }}>${sub.email}</td>
                        <td class="dimmed">${(sub.regulators || []).join(', ')}</td>
                        <td class="dimmed">${sub.frequency}</td>
                        <td class="dimmed" style=${{ fontSize: '12px' }}>${sub.last_sent ? relativeTime(sub.last_sent) : 'Never'}</td>
                        <td><button class="btn btn-sm btn-danger" onClick=${() => deleteEmailSub(sub.id)}>Remove</button></td>
                      </tr>
                    `)}
                  </tbody>
                </table>
              </div>
              <div style=${{ marginBottom: '20px' }}>
                <button class="btn btn-success" onClick=${sendDigests}>Send Digests Now</button>
              </div>
            `}

            <div class="section-title">Add New Subscription</div>

            <div class="form-group">
              <label>Email Address</label>
              <input type="email" value=${emailForm.email} onInput=${(e) => setEmailForm(f => ({...f, email: e.target.value}))} placeholder="compliance@company.com" />
            </div>

            <div class="form-group">
              <label>Recipient Name</label>
              <input value=${emailForm.name} onInput=${(e) => setEmailForm(f => ({...f, name: e.target.value}))} placeholder="Compliance Team" />
            </div>

            <div class="form-group">
              <label>Regulators</label>
              <div class="checkbox-group">
                <label><input type="checkbox" checked=${emailForm.regulators.includes('FINRA')} onChange=${() => toggleRegulator('FINRA')} /> FINRA</label>
                <label><input type="checkbox" checked=${emailForm.regulators.includes('FCA')} onChange=${() => toggleRegulator('FCA')} /> FCA</label>
              </div>
            </div>

            <div class="form-group">
              <label>Frequency</label>
              <select value=${emailForm.frequency} onChange=${(e) => setEmailForm(f => ({...f, frequency: e.target.value}))}>
                <option value="daily">Daily</option>
                <option value="weekly">Weekly</option>
              </select>
            </div>

            <div class="form-actions">
              <button class="btn" onClick=${() => setShowEmailForm(false)}>Close</button>
              <button class="btn btn-primary" onClick=${createEmailSub} disabled=${!emailForm.email}>Add Subscription</button>
            </div>
          </div>
        </div>
      `}
    </div>
  `;
}

// ============================================================
// App
// ============================================================

function App() {
  const [tab, setTab] = useState('dashboard');
  const [stats, setStats] = useState(null);
  const [filterOptions, setFilterOptions] = useState({
    regulators: [], categories: [], severities: [], actions: [], entity_types: [],
    source_regulators: [], source_series: [], audit_severities: [],
  });
  const [statsLoading, setStatsLoading] = useState(true);
  const [statsError, setStatsError] = useState(null);
  const [newsUnread, setNewsUnread] = useState(0);

  useEffect(() => {
    Promise.all([
      fetchJSON('/api/stats'),
      fetchJSON('/api/filter-options'),
    ]).then(([s, f]) => {
      setStats(s);
      setFilterOptions(f);
      setNewsUnread(s.news?.unread || 0);
    }).catch(e => {
      setStatsError(e.message);
    }).finally(() => {
      setStatsLoading(false);
    });
  }, []);

  // Refresh unread count when switching tabs
  useEffect(() => {
    if (tab === 'news') {
      fetchJSON('/api/news/unread-count').then(counts => {
        const total = Object.values(counts).reduce((s, n) => s + n, 0);
        setNewsUnread(total);
      }).catch(() => {});
    }
  }, [tab]);

  return html`
    <div class="app">
      <header>
        <span class="logo">CLHEAR.ai</span>
        <nav>
          <button class=${tab === 'dashboard' ? 'active' : ''} onClick=${() => setTab('dashboard')}>Dashboard</button>
          <button class=${tab === 'obligations' ? 'active' : ''} onClick=${() => setTab('obligations')}>Obligations</button>
          <button class=${tab === 'sources' ? 'active' : ''} onClick=${() => setTab('sources')}>Sources</button>
          <button class=${tab === 'news' ? 'active' : ''} onClick=${() => setTab('news')} style=${{ position: 'relative' }}>
            News
            ${newsUnread > 0 && html`<span class="nav-badge">${newsUnread}</span>`}
          </button>
          <button class=${tab === 'scheduler' ? 'active' : ''} onClick=${() => setTab('scheduler')}>Scheduler</button>
          <button class=${tab === 'audit' ? 'active' : ''} onClick=${() => setTab('audit')}>Audit Log</button>
        </nav>
      </header>
      <main>
        ${tab === 'dashboard' && html`<${DashboardView} stats=${stats} loading=${statsLoading} error=${statsError} />`}
        ${tab === 'obligations' && html`<${ObligationsView} filterOptions=${filterOptions} />`}
        ${tab === 'sources' && html`<${SourcesView} filterOptions=${filterOptions} />`}
        ${tab === 'news' && html`<${NewsView} />`}
        ${tab === 'scheduler' && html`<${SchedulerView} />`}
        ${tab === 'audit' && html`<${AuditView} filterOptions=${filterOptions} />`}
      </main>
    </div>
  `;
}

ReactDOM.createRoot(document.getElementById('root')).render(html`<${App} />`);
</script>
</body>
</html>
