# Build & push CLHear image to ECR and roll ECS. Does not run Terraform.
# Requires CLHEAR_AWS_DEPLOY_ROLE_ARN (from terraform output github_deploy_role_arn).
name: Deploy CLHear to ECS

on:
  push:
    branches: [main]
    paths:
      - "backend/**"
      - "frontend/**"
      - "Dockerfile"
      - ".dockerignore"
      - ".github/workflows/deploy-clhear-ecs.yml"
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.CLHEAR_AWS_REGION || 'us-east-1' }}
  ECR_REPOSITORY: ${{ vars.CLHEAR_ECR_REPOSITORY || 'clhear-staging' }}
  ECS_CLUSTER: ${{ vars.CLHEAR_ECS_CLUSTER || 'clhear-staging' }}
  ECS_SERVICE: ${{ vars.CLHEAR_ECS_SERVICE || 'clhear-staging-api' }}

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Set repo variable CLHEAR_DEPLOY_ENABLED=true after Terraform apply + CLHEAR_AWS_DEPLOY_ROLE_ARN secret exist.
    if: vars.CLHEAR_DEPLOY_ENABLED == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.CLHEAR_AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          REGISTRY: ${{ steps.ecr.outputs.registry }}
          IMAGE_TAG: latest
        run: |
          docker build -t $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f Dockerfile .
          docker push $REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Force new ECS deployment
        run: |
          aws ecs update-service \
            --cluster "$ECS_CLUSTER" \
            --service "$ECS_SERVICE" \
            --force-new-deployment \
            --region "$AWS_REGION"

      - name: Wait for service stability
        run: |
          aws ecs wait services-stable \
            --cluster "$ECS_CLUSTER" \
            --services "$ECS_SERVICE" \
            --region "$AWS_REGION"
